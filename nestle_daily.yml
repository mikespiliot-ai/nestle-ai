name: Nestle AI Daily Prediction

on:
  schedule:
    - cron: '30 17 * * 1-5'  # 17:30 UTC = 19:30 Ελλάδα (μετά κλείσιμο SIX)
  workflow_dispatch:  # Για χειροκίνητη εκτέλεση

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install gspread google-auth catboost lightgbm ta yfinance scikit-learn xgboost pandas numpy requests

      - name: Run Nestle AI
        run: python nestle_ai_sheets.py

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nestle-log-${{ github.run_number }}
          path: nestle_log.txt
          retention-days: 30
