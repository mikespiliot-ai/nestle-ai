name: Nestle Daily Prediction

on:
  schedule:
    # Τρέχει κάθε μέρα στις 18:30 UTC (= 19:30 ώρα Ελλάδας, μετά το κλείσιμο αγοράς)
    - cron: '30 18 * * 1-5'   # Δευτέρα - Παρασκευή μόνο
  workflow_dispatch:           # Επιτρέπει και χειροκίνητη εκτέλεση

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            yfinance \
            pandas \
            numpy \
            ta \
            requests \
            scikit-learn \
            xgboost \
            lightgbm \
            catboost \
            gspread \
            google-auth

      - name: Run prediction script
        run: python nestle_predictor.py

      - name: Upload log as artifact
        if: always()   # Ανεβάζει το log ακόμα και αν αποτύχει
        uses: actions/upload-artifact@v4
        with:
          name: nestle-log-${{ github.run_number }}
          path: nestle_log.txt
          retention-days: 30
