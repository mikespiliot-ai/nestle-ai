<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoLive — Τιμές & Μετατροπέας</title>
  <meta name="description" content="Παρακολουθήστε τιμές crypto σε πραγματικό χρόνο και μετατρέψτε νομίσματα εύκολα." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --accent: #58a6ff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-brand span { color: var(--accent); }

    .nav-links { display: flex; gap: 0.2rem; list-style: none; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.4rem 0.85rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface); }

    .nav-refresh {
      background: var(--accent);
      color: #0d1117;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .nav-refresh:hover { opacity: 0.85; }

    /* HERO */
    .hero { padding: 3rem 2rem 2rem; max-width: 1000px; margin: 0 auto; }
    .hero-title { font-size: 2rem; font-weight: 800; margin-bottom: 0.4rem; letter-spacing: -0.5px; }
    .hero-title span { color: var(--accent); }
    .hero-sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }

    .hero-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .hero-card {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.2rem;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .hero-card:hover { border-color: var(--accent); transform: translateY(-3px); }

    .hero-card-top { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.8rem; }
    .hero-card-top img { width: 32px; height: 32px; border-radius: 50%; }
    .hero-card-name { font-weight: 600; font-size: 0.95rem; }
    .hero-card-symbol { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
    .hero-card-price { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.3rem; }
    .hero-card-change { font-size: 0.85rem; font-weight: 600; }
    .hero-card-change.up { color: var(--green); }
    .hero-card-change.down { color: var(--red); }
    canvas.hero-spark { width: 100%; height: 40px; display: block; margin-top: 0.6rem; }

    /* SECTION */
    .section-wrap { max-width: 1000px; margin: 0 auto; padding: 2rem 2rem 0; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-title { font-size: 1.1rem; font-weight: 700; }

    #search {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      width: 220px;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    /* GRID */
    .grid-wrap { max-width: 1000px; margin: 0 auto; padding: 1rem 2rem 2rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.85rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .card-top { display: flex; align-items: center; gap: 0.65rem; }
    .card-top img { width: 30px; height: 30px; border-radius: 50%; }
    .coin-name { font-weight: 600; font-size: 0.9rem; }
    .coin-symbol { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
    .price { font-size: 1.15rem; font-weight: 700; }

    .card-bottom { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); }

    .change { font-weight: 600; font-size: 0.82rem; }
    .change.up { color: var(--green); }
    .change.down { color: var(--red); }

    .sparkline-wrap { margin-top: 0.3rem; }
    canvas.spark { width: 100%; height: 40px; display: block; }

    .skeleton { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .skeleton .price, .skeleton .coin-name, .skeleton .coin-symbol {
      background: var(--border); border-radius: 4px; color: transparent; user-select: none;
    }

    .error-msg { text-align: center; color: var(--red); margin: 2rem 0; }

    @keyframes flash-green { 0%,100% { background: transparent; } 50% { background: rgba(63,185,80,0.1); } }
    @keyframes flash-red   { 0%,100% { background: transparent; } 50% { background: rgba(248,81,73,0.1); } }
    .flash-up   { animation: flash-green 0.6s ease; }
    .flash-down { animation: flash-red   0.6s ease; }

    /* CONVERTER */
    .converter-wrap { max-width: 1000px; margin: 0 auto; padding: 0 2rem 4rem; }
    .converter-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; }

    .converter-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: end;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 600px) {
      .converter-row { grid-template-columns: 1fr; }
      nav { padding: 0 1rem; }
      .hero, .section-wrap, .grid-wrap, .converter-wrap { padding-left: 1rem; padding-right: 1rem; }
    }

    .conv-field label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.4rem; }

    .conv-input-wrap {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .conv-input-wrap:focus-within { border-color: var(--accent); }

    .conv-input-wrap input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      padding: 0.7rem 0.9rem;
      font-size: 1.1rem;
      font-weight: 600;
      outline: none;
      min-width: 0;
    }

    .conv-input-wrap select {
      background: var(--surface2);
      border: none;
      border-left: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
      min-width: 90px;
    }

    .swap-btn-wrap { display: flex; align-items: center; justify-content: center; padding-bottom: 2px; }
    .swap-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .swap-btn:hover { background: var(--border); }

    .conv-result {
      background: var(--bg);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      font-size: 1.05rem;
      color: var(--muted);
      min-height: 52px;
    }
    .conv-result strong { color: var(--text); font-size: 1.3rem; }
    .conv-result .rate { font-size: 0.8rem; margin-top: 0.3rem; }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 720px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      transform: translateY(20px);
      transition: transform 0.2s;
      position: relative;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s;
    }
    .modal-close:hover { color: var(--text); border-color: var(--text); }

    .modal-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .modal-header img { width: 52px; height: 52px; border-radius: 50%; }
    .modal-header .name { font-size: 1.5rem; font-weight: 700; }
    .modal-header .symbol { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; }
    .modal-header .rank { margin-left: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.25rem 0.6rem; font-size: 0.8rem; color: var(--muted); }

    .modal-price-row { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.5rem; }
    .modal-price { font-size: 2.2rem; font-weight: 800; }

    .modal-chart-wrap { margin-bottom: 1.5rem; background: var(--bg); border-radius: 10px; padding: 1rem; }
    .modal-chart-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
    canvas.modal-spark { width: 100%; height: 140px; display: block; }

    .modal-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    .stat-box { background: var(--bg); border-radius: 10px; padding: 0.9rem 1rem; }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 1rem; font-weight: 600; }
    .stat-value.up { color: var(--green); }
    .stat-value.down { color: var(--red); }
    .modal-loading { text-align: center; padding: 3rem 0; color: var(--muted); }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="#"><span>₿</span> CryptoLive</a>
  <ul class="nav-links">
    <li><a href="#market">Αγορά</a></li>
    <li><a href="#converter">Μετατροπέας</a></li>
  </ul>
  <button class="nav-refresh" id="refresh-btn">↻ Ανανέωση</button>
</nav>

<section class="hero" id="top">
  <h1 class="hero-title">Crypto <span>Live</span> Prices</h1>
  <p class="hero-sub">Ενημέρωση κάθε 30 δευτερόλεπτα &nbsp;·&nbsp; Τιμές σε EUR</p>
  <div class="hero-cards" id="hero-cards"></div>
</section>

<section id="market">
  <div class="section-wrap">
    <div class="section-header">
      <span class="section-title">Όλα τα Νομίσματα</span>
      <input id="search" type="search" placeholder="Αναζήτηση..." autocomplete="off" />
    </div>
  </div>
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
    <div id="error" class="error-msg" style="display:none"></div>
  </div>
</section>

<section id="converter">
  <div class="converter-wrap">
    <div class="section-header" style="margin-bottom:1rem">
      <span class="section-title">Μετατροπέας Συναλλάγματος</span>
    </div>
    <div class="converter-box">
      <div class="converter-row">
        <div class="conv-field">
          <label>Ποσό</label>
          <div class="conv-input-wrap">
            <input type="number" id="conv-amount" value="1" min="0" step="any" />
            <select id="conv-from"></select>
          </div>
        </div>
        <div class="swap-btn-wrap">
          <button class="swap-btn" id="swap-btn" title="Αντιστροφή">⇄</button>
        </div>
        <div class="conv-field">
          <label>Σε</label>
          <div class="conv-input-wrap">
            <input type="number" id="conv-to-amount" readonly style="color:var(--accent)" />
            <select id="conv-to"></select>
          </div>
        </div>
      </div>
      <div class="conv-result" id="conv-result">Εισάγετε ποσό για μετατροπή.</div>
    </div>
  </div>
</section>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const COINS = [
    'bitcoin','ethereum','tether','binancecoin','solana',
    'ripple','usd-coin','staked-ether','dogecoin','cardano',
    'avalanche-2','chainlink','tron','polkadot','shiba-inu',
    'matic-network','litecoin','bitcoin-cash','near','uniswap'
  ];

  const HERO_COINS = ['bitcoin','ethereum','solana','binancecoin'];

  const FIAT = [
    { id: 'eur', symbol: 'EUR' },
    { id: 'usd', symbol: 'USD' },
    { id: 'gbp', symbol: 'GBP' },
    { id: 'jpy', symbol: 'JPY' },
    { id: 'chf', symbol: 'CHF' },
  ];

  const CURRENCY = 'eur';
  const SYMBOL   = '€';
  const API_URL  = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=${CURRENCY}&ids=${COINS.join(',')}&order=market_cap_desc&per_page=20&page=1&sparkline=true&price_change_percentage=24h`;

  let data = [];
  let query = '';
  let fiatRates = {};

  function fmt(n) {
    if (!n && n !== 0) return '—';
    if (n >= 1000) return n.toLocaleString('el-GR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (n >= 1)    return n.toLocaleString('el-GR', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
    return n.toLocaleString('el-GR', { minimumFractionDigits: 4, maximumFractionDigits: 8 });
  }

  function fmtMktCap(n) {
    if (!n) return '—';
    if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
    if (n >= 1e9)  return (n/1e9).toFixed(2) + 'B';
    if (n >= 1e6)  return (n/1e6).toFixed(2) + 'M';
    return n.toFixed(0);
  }

  function drawSparkline(canvas, prices, isUp, H = 40) {
    const ctx = canvas.getContext('2d');
    const W = canvas.offsetWidth || 220;
    canvas.width  = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
    const min = Math.min(...prices), max = Math.max(...prices);
    const range = max - min || 1;
    const step  = W / (prices.length - 1);
    ctx.beginPath();
    prices.forEach((p, i) => {
      const x = i * step;
      const y = H - ((p - min) / range) * (H - 6) - 3;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = isUp ? '#3fb950' : '#f85149';
    ctx.lineWidth = 1.8;
    ctx.stroke();
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, isUp ? 'rgba(63,185,80,0.2)' : 'rgba(248,81,73,0.2)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Hero
  function renderHero() {
    const heroEl = document.getElementById('hero-cards');
    const heroes = HERO_COINS.map(id => data.find(c => c.id === id)).filter(Boolean);
    heroEl.innerHTML = '';
    heroes.forEach(coin => {
      const pct  = coin.price_change_percentage_24h ?? 0;
      const isUp = pct >= 0;
      const prices = coin.sparkline_in_7d?.price ?? [];
      const card = document.createElement('div');
      card.className = 'hero-card';
      card.innerHTML = `
        <div class="hero-card-top">
          <img src="${coin.image}" alt="${coin.name}" />
          <div><div class="hero-card-name">${coin.name}</div><div class="hero-card-symbol">${coin.symbol}</div></div>
        </div>
        <div class="hero-card-price">${SYMBOL}${fmt(coin.current_price)}</div>
        <div class="hero-card-change ${isUp?'up':'down'}">${isUp?'+':''}${pct.toFixed(2)}% (24h)</div>
        <canvas class="hero-spark"></canvas>
      `;
      card.addEventListener('click', () => openModal(coin.id));
      heroEl.appendChild(card);
      requestAnimationFrame(() => {
        const cv = card.querySelector('canvas.hero-spark');
        if (prices.length > 1) drawSparkline(cv, prices, isUp, 40);
      });
    });
  }

  // Grid
  const grid  = document.getElementById('grid');
  const errEl = document.getElementById('error');

  function render() {
    const filtered = data.filter(c =>
      c.name.toLowerCase().includes(query) || c.symbol.toLowerCase().includes(query)
    );

    if (!filtered.length && data.length) {
      grid.innerHTML = '<p style="color:var(--muted);grid-column:1/-1;text-align:center;padding:2rem">Δεν βρέθηκαν αποτελέσματα.</p>';
      return;
    }

    const existing = {};
    grid.querySelectorAll('.card[data-id]').forEach(c => { existing[c.dataset.id] = c; });
    const fragment = document.createDocumentFragment();

    filtered.forEach(coin => {
      const pct    = coin.price_change_percentage_24h ?? 0;
      const isUp   = pct >= 0;
      const change = (isUp ? '+' : '') + pct.toFixed(2) + '%';
      const prices = coin.sparkline_in_7d?.price ?? [];
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = coin.id;
      card.innerHTML = `
        <div class="card-top">
          <img src="${coin.image}" alt="${coin.name}" loading="lazy" />
          <div><div class="coin-name">${coin.name}</div><div class="coin-symbol">${coin.symbol}</div></div>
          <div class="change ${isUp?'up':'down'}" style="margin-left:auto">${change}</div>
        </div>
        <div class="price">${SYMBOL}${fmt(coin.current_price)}</div>
        <div class="card-bottom">
          <span>Κεφ: ${SYMBOL}${fmtMktCap(coin.market_cap)}</span>
          <span>Όγκος: ${SYMBOL}${fmtMktCap(coin.total_volume)}</span>
        </div>
        <div class="sparkline-wrap"><canvas class="spark"></canvas></div>
      `;
      if (existing[coin.id]) {
        const oldPrice = parseFloat(existing[coin.id].querySelector('.price').textContent.replace(/[^0-9.,]/g,'').replace(',','.'));
        if (!isNaN(oldPrice) && Math.abs(oldPrice - coin.current_price) > 0)
          card.classList.add(coin.current_price > oldPrice ? 'flash-up' : 'flash-down');
      }
      card.addEventListener('click', () => openModal(coin.id));
      fragment.appendChild(card);
      requestAnimationFrame(() => {
        const cv = card.querySelector('canvas.spark');
        if (prices.length > 1) drawSparkline(cv, prices, isUp, 40);
      });
    });

    grid.innerHTML = '';
    grid.appendChild(fragment);
    renderHero();
  }

  function showSkeletons() {
    grid.innerHTML = Array.from({ length: 8 }, () => `
      <div class="card skeleton">
        <div class="card-top">
          <div style="width:30px;height:30px;border-radius:50%;background:var(--border)"></div>
          <div><div class="coin-name">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div><div class="coin-symbol">&nbsp;&nbsp;&nbsp;&nbsp;</div></div>
        </div>
        <div class="price">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>
      </div>`).join('');
  }

  async function fetchPrices() {
    errEl.style.display = 'none';
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
      render();
      populateConverter();
      convert();
    } catch (e) {
      console.error(e);
      if (!data.length) { grid.innerHTML = ''; errEl.style.display = 'block'; errEl.textContent = 'Αποτυχία φόρτωσης. Ελέγξτε τη σύνδεσή σας.'; }
    }
  }

  // Converter
  async function fetchFiatRates() {
    try {
      const res = await fetch('https://api.coingecko.com/api/v3/exchange_rates');
      if (!res.ok) return;
      fiatRates = (await res.json()).rates;
    } catch (_) {}
  }

  function populateConverter() {
    const fromSel = document.getElementById('conv-from');
    const toSel   = document.getElementById('conv-to');
    const prevFrom = fromSel.value;
    const prevTo   = toSel.value;
    fromSel.innerHTML = toSel.innerHTML = '';
    data.forEach(coin => {
      const sym = coin.symbol.toUpperCase();
      fromSel.innerHTML += `<option value="crypto:${coin.id}">${sym}</option>`;
      toSel.innerHTML   += `<option value="crypto:${coin.id}">${sym}</option>`;
    });
    FIAT.forEach(f => {
      fromSel.innerHTML += `<option value="fiat:${f.id}">${f.symbol}</option>`;
      toSel.innerHTML   += `<option value="fiat:${f.id}">${f.symbol}</option>`;
    });
    fromSel.value = prevFrom || 'crypto:bitcoin';
    toSel.value   = prevTo   || 'fiat:eur';
  }

  function getEurPrice(key) {
    const [type, id] = key.split(':');
    if (type === 'crypto') { const coin = data.find(c => c.id === id); return coin?.current_price ?? null; }
    if (id === 'eur') return 1;
    if (fiatRates?.[id]) return (fiatRates['eur']?.value || 1) / fiatRates[id].value;
    return null;
  }

  function getLabel(key) {
    const [type, id] = key.split(':');
    if (type === 'crypto') return data.find(c => c.id === id)?.symbol?.toUpperCase() || id;
    return FIAT.find(f => f.id === id)?.symbol || id.toUpperCase();
  }

  function convert() {
    const amount  = parseFloat(document.getElementById('conv-amount').value) || 0;
    const fromKey = document.getElementById('conv-from').value;
    const toKey   = document.getElementById('conv-to').value;
    const resultEl = document.getElementById('conv-result');
    const toAmtEl  = document.getElementById('conv-to-amount');
    if (!fromKey || !toKey || !data.length) return;
    const fromEur = getEurPrice(fromKey), toEur = getEurPrice(toKey);
    if (!fromEur || !toEur) { resultEl.innerHTML = 'Δεν βρέθηκαν δεδομένα.'; return; }
    const result = (amount * fromEur) / toEur;
    const rate   = fromEur / toEur;
    const fromLabel = getLabel(fromKey), toLabel = getLabel(toKey);
    toAmtEl.value = result.toLocaleString('el-GR', { maximumFractionDigits: 8 });
    resultEl.innerHTML = `
      <strong>${amount.toLocaleString('el-GR')} ${fromLabel} = ${result.toLocaleString('el-GR', { maximumFractionDigits: 8 })} ${toLabel}</strong>
      <div class="rate">1 ${fromLabel} = ${rate.toLocaleString('el-GR', { maximumFractionDigits: 8 })} ${toLabel}</div>`;
  }

  document.getElementById('conv-amount').addEventListener('input', convert);
  document.getElementById('conv-from').addEventListener('change', convert);
  document.getElementById('conv-to').addEventListener('change', convert);
  document.getElementById('swap-btn').addEventListener('click', () => {
    const f = document.getElementById('conv-from'), t = document.getElementById('conv-to');
    [f.value, t.value] = [t.value, f.value];
    convert();
  });

  // Modal
  const overlay   = document.getElementById('modal-overlay');
  const modalBody = document.getElementById('modal-body');

  function openModal(coinId) {
    const coin = data.find(c => c.id === coinId);
    if (!coin) return;
    modalBody.innerHTML = '<div class="modal-loading">Φόρτωση...</div>';
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    renderModal(coin);
    fetchModalExtras(coin);
  }

  function renderModal(coin) {
    const pct  = coin.price_change_percentage_24h ?? 0;
    const isUp = pct >= 0;
    const prices = coin.sparkline_in_7d?.price ?? [];
    modalBody.innerHTML = `
      <div class="modal-header">
        <img src="${coin.image}" alt="${coin.name}" />
        <div><div class="name">${coin.name}</div><div class="symbol">${coin.symbol}</div></div>
        <div class="rank">#${coin.market_cap_rank ?? '—'}</div>
      </div>
      <div class="modal-price-row">
        <div class="modal-price">${SYMBOL}${fmt(coin.current_price)}</div>
        <div class="change ${isUp?'up':'down'}" style="font-size:1.1rem">${isUp?'+':''}${pct.toFixed(2)}% (24h)</div>
      </div>
      <div class="modal-chart-wrap">
        <div class="modal-chart-label">Γράφημα 7 ημερών</div>
        <canvas class="modal-spark" id="modal-canvas"></canvas>
      </div>
      <div class="modal-stats" id="modal-stats">
        <div class="stat-box"><div class="stat-label">Market Cap</div><div class="stat-value">${SYMBOL}${fmtMktCap(coin.market_cap)}</div></div>
        <div class="stat-box"><div class="stat-label">24h Όγκος</div><div class="stat-value">${SYMBOL}${fmtMktCap(coin.total_volume)}</div></div>
        <div class="stat-box"><div class="stat-label">24h Υψηλό</div><div class="stat-value">${SYMBOL}${fmt(coin.high_24h)}</div></div>
        <div class="stat-box"><div class="stat-label">24h Χαμηλό</div><div class="stat-value">${SYMBOL}${fmt(coin.low_24h)}</div></div>
        <div class="stat-box"><div class="stat-label">Κυκλ. Προσφορά</div><div class="stat-value">${coin.circulating_supply?(coin.circulating_supply/1e6).toFixed(2)+'M':'—'}</div></div>
        <div class="stat-box"><div class="stat-label">Μέγ. Προσφορά</div><div class="stat-value">${coin.max_supply?(coin.max_supply/1e6).toFixed(2)+'M':'∞'}</div></div>
        <div class="stat-box"><div class="stat-label">ATH</div><div class="stat-value">${SYMBOL}${fmt(coin.ath)}</div></div>
        <div class="stat-box"><div class="stat-label">Από ATH</div><div class="stat-value ${(coin.ath_change_percentage??0)>=0?'up':'down'}">${(coin.ath_change_percentage??0).toFixed(2)}%</div></div>
      </div>`;
    requestAnimationFrame(() => {
      const cv = document.getElementById('modal-canvas');
      if (cv && prices.length > 1) drawSparkline(cv, prices, isUp, 140);
    });
  }

  async function fetchModalExtras(coin) {
    try {
      const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coin.id}?localization=false&tickers=false&community_data=false&developer_data=false`);
      if (!res.ok) return;
      const detail = await res.json();
      const statsEl = document.getElementById('modal-stats');
      if (!statsEl) return;
      const desc = detail.description?.en?.split('. ').slice(0,2).join('. ');
      if (desc) {
        const box = document.createElement('div');
        box.style.cssText = 'grid-column:1/-1;background:var(--bg);border-radius:10px;padding:0.9rem 1rem;';
        box.innerHTML = `<div class="stat-label" style="margin-bottom:0.4rem">Περιγραφή</div><div style="font-size:0.85rem;color:var(--muted);line-height:1.6">${desc}.</div>`;
        statsEl.appendChild(box);
      }
    } catch (_) {}
  }

  function closeModal() { overlay.classList.remove('open'); document.body.style.overflow = ''; }
  document.getElementById('modal-close').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Init
  showSkeletons();
  fetchFiatRates();
  fetchPrices();
  setInterval(fetchPrices, 30_000);
  document.getElementById('refresh-btn').addEventListener('click', fetchPrices);
  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value.trim().toLowerCase();
    if (data.length) render();
  });
</script>
</body>
</html>
