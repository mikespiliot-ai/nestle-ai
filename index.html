<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Live Prices | Real-time Updates</title>
  <meta name="description" content="Παρακολουθήστε τιμές crypto σε πραγματικό χρόνο. Bitcoin, Ethereum και 18 ακόμα νομίσματα σε EUR." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --accent: #58a6ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    .meta { margin-top: 0.5rem; font-size: 0.85rem; color: var(--muted); }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: 0.5rem;
      transition: background 0.15s;
    }
    #refresh-btn:hover { background: var(--surface); }

    .search-wrap { max-width: 900px; margin: 0 auto 1.5rem; }
    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .card-top { display: flex; align-items: center; gap: 0.75rem; }
    .card-top img { width: 36px; height: 36px; border-radius: 50%; }
    .coin-name { font-weight: 600; font-size: 1rem; }
    .coin-symbol { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
    .price { font-size: 1.35rem; font-weight: 700; }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .change { font-weight: 600; font-size: 0.9rem; }
    .change.up { color: var(--green); }
    .change.down { color: var(--red); }

    .sparkline-wrap { margin-top: 0.5rem; }
    canvas.spark { width: 100%; height: 48px; display: block; }

    .skeleton { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .skeleton .price, .skeleton .coin-name, .skeleton .coin-symbol {
      background: var(--border); border-radius: 4px; color: transparent; user-select: none;
    }

    .error-msg { text-align: center; color: var(--red); margin-top: 3rem; font-size: 1rem; }

    @keyframes flash-green { 0%,100% { background: transparent; } 50% { background: rgba(63,185,80,0.12); } }
    @keyframes flash-red   { 0%,100% { background: transparent; } 50% { background: rgba(248,81,73,0.12); } }
    .flash-up   { animation: flash-green 0.6s ease; }
    .flash-down { animation: flash-red   0.6s ease; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 720px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      transform: translateY(20px);
      transition: transform 0.2s;
      position: relative;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s;
    }
    .modal-close:hover { color: var(--text); border-color: var(--text); }

    .modal-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .modal-header img { width: 52px; height: 52px; border-radius: 50%; }
    .modal-header .name { font-size: 1.5rem; font-weight: 700; }
    .modal-header .symbol { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; }
    .modal-header .rank {
      margin-left: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .modal-price-row { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.5rem; }
    .modal-price { font-size: 2.2rem; font-weight: 800; }

    .modal-chart-wrap {
      margin-bottom: 1.5rem;
      background: var(--bg);
      border-radius: 10px;
      padding: 1rem;
    }
    .modal-chart-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
    canvas.modal-spark { width: 100%; height: 140px; display: block; }

    .modal-stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
    }
    .stat-box { background: var(--bg); border-radius: 10px; padding: 0.9rem 1rem; }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 1rem; font-weight: 600; }
    .stat-value.up { color: var(--green); }
    .stat-value.down { color: var(--red); }

    .modal-loading { text-align: center; padding: 3rem 0; color: var(--muted); font-size: 0.95rem; }
  </style>
</head>
<body>

<header>
  <h1>Crypto <span>Live</span> Prices</h1>
  <p class="meta">
    Ενημέρωση κάθε 30 δευτερόλεπτα &nbsp;|&nbsp; Δεδομένα: CoinGecko
    <button id="refresh-btn">Ανανέωση</button>
  </p>
</header>

<div class="search-wrap">
  <input id="search" type="search" placeholder="Αναζήτηση νομίσματος..." autocomplete="off" />
</div>

<div class="grid" id="grid"></div>
<div id="error" class="error-msg" style="display:none"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const COINS = [
    'bitcoin','ethereum','tether','binancecoin','solana',
    'ripple','usd-coin','staked-ether','dogecoin','cardano',
    'avalanche-2','chainlink','tron','polkadot','shiba-inu',
    'matic-network','litecoin','bitcoin-cash','near','uniswap'
  ];

  const CURRENCY = 'eur';
  const SYMBOL   = '€';
  const API_URL  = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=${CURRENCY}&ids=${COINS.join(',')}&order=market_cap_desc&per_page=20&page=1&sparkline=true&price_change_percentage=24h`;

  let data = [];
  let query = '';

  function fmt(n) {
    if (n >= 1000) return n.toLocaleString('el-GR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (n >= 1)    return n.toLocaleString('el-GR', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
    return n.toLocaleString('el-GR', { minimumFractionDigits: 4, maximumFractionDigits: 8 });
  }

  function fmtMktCap(n) {
    if (!n) return '—';
    if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
    if (n >= 1e9)  return (n/1e9).toFixed(2) + 'B';
    if (n >= 1e6)  return (n/1e6).toFixed(2) + 'M';
    return n.toFixed(0);
  }

  function drawSparkline(canvas, prices, isUp, H = 48) {
    const ctx = canvas.getContext('2d');
    const W = canvas.offsetWidth || 220;
    canvas.width  = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);

    const min = Math.min(...prices);
    const max = Math.max(...prices);
    const range = max - min || 1;
    const step  = W / (prices.length - 1);

    ctx.beginPath();
    prices.forEach((p, i) => {
      const x = i * step;
      const y = H - ((p - min) / range) * (H - 8) - 4;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = isUp ? '#3fb950' : '#f85149';
    ctx.lineWidth   = 2;
    ctx.stroke();

    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, isUp ? 'rgba(63,185,80,0.22)' : 'rgba(248,81,73,0.22)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fill();
  }

  const grid  = document.getElementById('grid');
  const errEl = document.getElementById('error');

  function render() {
    const filtered = data.filter(c =>
      c.name.toLowerCase().includes(query) ||
      c.symbol.toLowerCase().includes(query)
    );

    if (!filtered.length && data.length) {
      grid.innerHTML = '<p style="color:var(--muted);grid-column:1/-1;text-align:center">Δεν βρέθηκαν αποτελέσματα.</p>';
      return;
    }

    const existing = {};
    grid.querySelectorAll('.card[data-id]').forEach(c => { existing[c.dataset.id] = c; });

    const fragment = document.createDocumentFragment();

    filtered.forEach(coin => {
      const pct    = coin.price_change_percentage_24h ?? 0;
      const isUp   = pct >= 0;
      const change = (isUp ? '+' : '') + pct.toFixed(2) + '%';
      const prices = coin.sparkline_in_7d?.price ?? [];

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = coin.id;

      card.innerHTML = `
        <div class="card-top">
          <img src="${coin.image}" alt="${coin.name}" loading="lazy" />
          <div>
            <div class="coin-name">${coin.name}</div>
            <div class="coin-symbol">${coin.symbol}</div>
          </div>
          <div class="change ${isUp ? 'up' : 'down'}" style="margin-left:auto">${change}</div>
        </div>
        <div class="price">${SYMBOL}${fmt(coin.current_price)}</div>
        <div class="card-bottom">
          <span>Κεφ/ση: ${SYMBOL}${fmtMktCap(coin.market_cap)}</span>
          <span>24h Όγκος: ${SYMBOL}${fmtMktCap(coin.total_volume)}</span>
        </div>
        <div class="sparkline-wrap"><canvas class="spark"></canvas></div>
      `;

      if (existing[coin.id]) {
        const oldPrice = parseFloat(existing[coin.id].querySelector('.price').textContent.replace(/[^0-9.,]/g,'').replace(',','.'));
        if (!isNaN(oldPrice) && Math.abs(oldPrice - coin.current_price) > 0) {
          card.classList.add(coin.current_price > oldPrice ? 'flash-up' : 'flash-down');
        }
      }

      card.addEventListener('click', () => openModal(coin.id));
      fragment.appendChild(card);

      requestAnimationFrame(() => {
        const canvas = card.querySelector('canvas.spark');
        if (prices.length > 1) drawSparkline(canvas, prices, isUp, 48);
      });
    });

    grid.innerHTML = '';
    grid.appendChild(fragment);
  }

  function showSkeletons() {
    grid.innerHTML = Array.from({ length: 8 }, () => `
      <div class="card skeleton">
        <div class="card-top">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--border)"></div>
          <div>
            <div class="coin-name">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>
            <div class="coin-symbol">&nbsp;&nbsp;&nbsp;&nbsp;</div>
          </div>
        </div>
        <div class="price">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>
      </div>
    `).join('');
  }

  async function fetchPrices() {
    errEl.style.display = 'none';
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
      render();
    } catch (e) {
      console.error(e);
      if (!data.length) {
        grid.innerHTML = '';
        errEl.style.display = 'block';
        errEl.textContent = 'Αποτυχία φόρτωσης δεδομένων. Ελέγξτε τη σύνδεσή σας και δοκιμάστε ξανά.';
      }
    }
  }

  // Modal

  const overlay   = document.getElementById('modal-overlay');
  const modalBody = document.getElementById('modal-body');

  function openModal(coinId) {
    const coin = data.find(c => c.id === coinId);
    if (!coin) return;

    modalBody.innerHTML = '<div class="modal-loading">Φόρτωση αναλυτικών...</div>';
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    renderModal(coin);
    fetchModalExtras(coin);
  }

  function renderModal(coin) {
    const pct    = coin.price_change_percentage_24h ?? 0;
    const isUp   = pct >= 0;
    const prices = coin.sparkline_in_7d?.price ?? [];

    modalBody.innerHTML = `
      <div class="modal-header">
        <img src="${coin.image}" alt="${coin.name}" />
        <div>
          <div class="name">${coin.name}</div>
          <div class="symbol">${coin.symbol}</div>
        </div>
        <div class="rank">#${coin.market_cap_rank ?? '—'}</div>
      </div>

      <div class="modal-price-row">
        <div class="modal-price">${SYMBOL}${fmt(coin.current_price)}</div>
        <div class="change ${isUp ? 'up' : 'down'}" style="font-size:1.1rem">${(isUp?'+':'')+pct.toFixed(2)}% (24h)</div>
      </div>

      <div class="modal-chart-wrap">
        <div class="modal-chart-label">Γράφημα 7 ημερών</div>
        <canvas class="modal-spark" id="modal-canvas"></canvas>
      </div>

      <div class="modal-stats" id="modal-stats">
        <div class="stat-box">
          <div class="stat-label">Market Cap</div>
          <div class="stat-value">${SYMBOL}${fmtMktCap(coin.market_cap)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">24h Όγκος</div>
          <div class="stat-value">${SYMBOL}${fmtMktCap(coin.total_volume)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">24h Υψηλό</div>
          <div class="stat-value">${SYMBOL}${fmt(coin.high_24h ?? 0)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">24h Χαμηλό</div>
          <div class="stat-value">${SYMBOL}${fmt(coin.low_24h ?? 0)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Κυκλ. Προσφορά</div>
          <div class="stat-value">${coin.circulating_supply ? (coin.circulating_supply/1e6).toFixed(2)+'M' : '—'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Μέγ. Προσφορά</div>
          <div class="stat-value">${coin.max_supply ? (coin.max_supply/1e6).toFixed(2)+'M' : '∞'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">ATH</div>
          <div class="stat-value">${SYMBOL}${fmt(coin.ath ?? 0)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Από ATH</div>
          <div class="stat-value ${(coin.ath_change_percentage??0) >= 0 ? 'up':'down'}">${(coin.ath_change_percentage??0).toFixed(2)}%</div>
        </div>
      </div>
    `;

    requestAnimationFrame(() => {
      const canvas = document.getElementById('modal-canvas');
      if (canvas && prices.length > 1) drawSparkline(canvas, prices, isUp, 140);
    });
  }

  async function fetchModalExtras(coin) {
    try {
      const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coin.id}?localization=false&tickers=false&community_data=false&developer_data=false`);
      if (!res.ok) return;
      const detail = await res.json();

      const statsEl = document.getElementById('modal-stats');
      if (!statsEl) return;

      const desc = detail.description?.en?.split('. ').slice(0,2).join('. ');
      if (desc) {
        const box = document.createElement('div');
        box.style.cssText = 'grid-column:1/-1;background:var(--bg);border-radius:10px;padding:0.9rem 1rem;';
        box.innerHTML = `<div class="stat-label" style="margin-bottom:0.4rem">Περιγραφή</div><div style="font-size:0.85rem;color:var(--muted);line-height:1.6">${desc}.</div>`;
        statsEl.appendChild(box);
      }
    } catch (_) {}
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  showSkeletons();
  fetchPrices();
  setInterval(fetchPrices, 30_000);

  document.getElementById('refresh-btn').addEventListener('click', fetchPrices);
  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value.trim().toLowerCase();
    if (data.length) render();
  });
</script>
</body>
</html>
